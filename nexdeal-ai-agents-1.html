<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexDeal AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--p:#6366f1;--p2:#818cf8;--a:#f97316;--bg:#07060f;--bg2:#0e0c1e;--bg3:#161430;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.1);--border2:rgba(99,102,241,0.3);--text:#f0eeff;--muted:#8b87b0;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
body{display:flex;flex-direction:column;position:relative;}
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.1;animation:float 8s ease-in-out infinite;}
.o1{width:400px;height:400px;background:#6366f1;top:-100px;left:-100px;}
.o2{width:300px;height:300px;background:#f97316;bottom:-80px;right:-80px;animation-delay:3s;}
.o3{width:200px;height:200px;background:#06b6d4;top:40%;left:50%;animation-delay:5s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
.hdr{position:relative;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(14,12,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;}
.back{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:7px 12px;cursor:pointer;color:var(--text);font-size:15px;text-decoration:none;transition:all .2s;}
.back:hover{background:var(--glass2);}
.ai-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.ai-nm{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.ai-st{font-size:11px;color:#10b981;display:flex;align-items:center;gap:4px;}
.ai-st::before{content:'';width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{position:relative;z-index:10;display:flex;gap:5px;padding:10px 14px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:rgba(14,12,30,.5);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--glass);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s;}
.tab.on{background:var(--p);color:#fff;border-color:var(--p);}
.chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-track{background:transparent;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;gap:9px;animation:fuP .3s ease;}
@keyframes fuP{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.mav{width:31px;height:31px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.mav.ai{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.mav.user{background:linear-gradient(135deg,#f97316,#fbbf24);}
.bubble{max-width:82%;padding:11px 13px;border-radius:16px;font-size:13.5px;line-height:1.55;}
.ai-b{background:rgba(99,102,241,.1);color:var(--text);border:1px solid rgba(99,102,241,.2);border-radius:4px 16px 16px 16px;}
.user-b{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border-radius:16px 4px 16px 16px;}
.typing{display:flex;gap:4px;align-items:center;padding:12px 14px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite;}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.qchips{position:relative;z-index:10;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 14px 10px;flex-shrink:0;}
.qchips::-webkit-scrollbar{display:none;}
.qc{padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .2s;}
.qc:hover{border-color:var(--p);color:var(--p);}
.inp-row{display:flex;gap:8px;padding:11px 14px;background:rgba(14,12,30,.85);backdrop-filter:blur(20px);border-top:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;}
.ci{flex:1;padding:11px 15px;border-radius:999px;border:1px solid var(--border);background:var(--glass2);color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;}
.ci:focus{border-color:var(--p);}
.ci::placeholder{color:var(--muted);}
.sb{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p2));border:none;color:#fff;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.sb:hover{transform:scale(1.08);}
.sb:disabled{opacity:.45;cursor:not-allowed;transform:none;}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="ai-av">🤖</div>
  <div>
    <div class="ai-nm">NexDeal AI</div>
    <div class="ai-st">Online • Groq AI Powered</div>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="setMode('general',this)">🤖 Assistant</button>
  <button class="tab" onclick="setMode('deals',this)">🔍 Deal Finder</button>
  <button class="tab" onclick="setMode('compare',this)">⚖️ Compare</button>
  <button class="tab" onclick="setMode('budget',this)">💰 Budget</button>
  <button class="tab" onclick="setMode('support',this)">💬 Support</button>
</div>
<div class="chat-area" id="chatArea">
  <div class="msg">
    <div class="mav ai">🤖</div>
    <div class="bubble ai-b">🙏 <strong>Namaste! I'm NexDeal AI</strong><br><br>Ask me anything about electronics — phones, laptops, earbuds, prices, comparisons. I'll help you buy smart and save money!<br><br>📱 Best phone under ₹20k?<br>⚖️ iPhone vs Samsung comparison?<br>💻 Best laptop for coding?<br>🎧 Earbuds under ₹2000?</div>
  </div>
</div>
<div class="qchips">
  <button class="qc" onclick="quick('Best phone under ₹20,000?')">📱 Under ₹20k</button>
  <button class="qc" onclick="quick('Best earbuds under ₹2000?')">🎧 Earbuds ₹2k</button>
  <button class="qc" onclick="quick('iPhone 17 vs Samsung S25 Ultra honest comparison')">⚖️ Compare</button>
  <button class="qc" onclick="quick('Best laptop for CSE student under ₹60,000?')">💻 Study Laptop</button>
  <button class="qc" onclick="quick('Amazon or Flipkart which is better for electronics?')">🛒 Which Platform</button>
  <button class="qc" onclick="quick('Best smartwatch under ₹5000?')">⌚ Smartwatch</button>
</div>
<div class="inp-row">
  <input class="ci" id="ci" placeholder="Ask about any product..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()">
  <button class="sb" id="sb" onclick="sendMsg()">➤</button>
</div>
<script>
let msgs=[];
let mode='general';
const MODES={
  general:'You are NexDeal AI — India\'s smartest electronics shopping assistant. Help with any product queries.',
  deals:'You are a Deal Finder. Find the best current deals and discounts on electronics in India. Focus on value for money and mention specific prices.',
  compare:'You are a Product Comparator. Give detailed honest comparisons. Use clear formatting with pros and cons.',
  budget:'You are a Budget Advisor. Help users find the best products within their budget in Indian Rupees. Always ask for budget if not specified.',
  support:'You are a Customer Support agent for NexDeal. Help users with the website, how to find products, how to compare prices, and shopping tips.',
};
function setMode(m,el){mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');}
function addMsg(role,text){
  msgs.push({role,content:text});
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg'+(role==='user'?' user':'');
  div.innerHTML=`<div class="mav ${role==='user'?'user':'ai'}">${role==='user'?'👤':'🤖'}</div><div class="bubble ${role==='user'?'user-b':'ai-b'}">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}
function showTyping(){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className='msg';div.id='typing';
  div.innerHTML='<div class="mav ai">🤖</div><div class="bubble ai-b"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function hideTyping(){document.getElementById('typing')?.remove();}
async function sendMsg(){
  const inp=document.getElementById('ci');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  document.getElementById('sb').disabled=true;
  addMsg('user',text);
  showTyping();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:`${MODES[mode]}\n\nYou are NexDeal AI built by Ajaykumar106 (CSE student). Always use Indian Rupees. Be helpful, concise, add emojis. Suggest nexdeal-ten.vercel.app for live price comparison.`,
        messages:msgs.slice(-8)
      })
    });
    const data=await res.json();
    hideTyping();
    addMsg('assistant',data.reply||'Sorry, I could not respond right now. Please try again!');
  }catch(e){
    hideTyping();
    addMsg('assistant','⚠️ Connection error. Please check your internet and try again!');
  }
  document.getElementById('sb').disabled=false;
  document.getElementById('ci').focus();
}
function quick(q){document.getElementById('ci').value=q;sendMsg();}
</script>
</body>
</html>
